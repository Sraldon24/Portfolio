<!doctype html>
<html><head><meta charset="utf-8"><title>CRT Portrait</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_brand.css">
<style>
.ptr{width:800px;height:800px;position:relative;display:flex;align-items:center;justify-content:center;padding:40px;border-radius:0}
.bezel{position:relative;width:720px;height:720px;border-radius:48px;background:linear-gradient(145deg,#1a1200,#0f0900 60%,#050300);box-shadow:inset 0 0 0 6px #1a0d00,inset 0 0 0 12px rgba(245,158,11,.45),0 0 140px rgba(234,88,12,.55)}
.scr{position:absolute;inset:38px;border-radius:26px;background:radial-gradient(ellipse at 50% 45%,#3a2400 0%,#1a1200 55%,#0a0800 100%);overflow:hidden;display:flex;align-items:center;justify-content:center}
.scr::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(0,0,0,.42) 2px,rgba(0,0,0,.42) 4px);mix-blend-mode:multiply;z-index:5;pointer-events:none}
.scr::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 72% 78% at 50% 50%,transparent 46%,rgba(10,8,0,.55) 80%,rgba(10,8,0,.96) 100%);z-index:6;pointer-events:none}
.noise{position:absolute;inset:0;pointer-events:none;z-index:4;opacity:.18;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.3' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px;mix-blend-mode:overlay}
.sweep{position:absolute;left:0;right:0;height:130px;background:linear-gradient(180deg,transparent,rgba(245,158,11,.13) 50%,transparent);pointer-events:none;z-index:7;animation:sw 8s linear infinite}
@keyframes sw{0%{top:-200px}100%{top:900px}}
.cr-c{position:absolute;width:28px;height:28px;border:2.5px solid #f59e0b;opacity:.9;z-index:8}
.cr-c.tl{top:56px;left:56px;border-right:none;border-bottom:none}
.cr-c.tr{top:56px;right:56px;border-left:none;border-bottom:none}
.cr-c.bl{bottom:56px;left:56px;border-right:none;border-top:none}
.cr-c.br{bottom:56px;right:56px;border-left:none;border-top:none}
.cr-s{position:absolute;width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(245,158,11,.8),rgba(245,158,11,.2));border:1.5px solid rgba(245,158,11,.55);z-index:9}
.cr-s.tl{top:18px;left:18px}.cr-s.tr{top:18px;right:18px}.cr-s.bl{bottom:18px;left:18px}.cr-s.br{bottom:18px;right:18px}
.sil{width:62%;height:62%;display:flex;align-items:flex-end;justify-content:center;position:relative;z-index:2;filter:drop-shadow(0 0 14px rgba(234,88,12,.55))}
.meta{position:absolute;top:24px;left:24px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#f59e0b;letter-spacing:.24em;z-index:10;opacity:.85;text-shadow:0 0 5px rgba(245,158,11,.6)}
.meta2{position:absolute;bottom:24px;right:24px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#4ade80;letter-spacing:.24em;z-index:10;display:flex;align-items:center;gap:6px;text-shadow:0 0 5px rgba(74,222,128,.6)}
.sd{width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 8px rgba(74,222,128,.95);animation:blink 1.1s step-end infinite}
.boot{position:absolute;top:58px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(245,158,11,.55);letter-spacing:.28em;z-index:10}
</style></head>
<body><div class="asset ptr">
  <div class="fx-radial" style="z-index:-1"></div>
  <div class="bezel">
    <span class="cr-s tl"></span><span class="cr-s tr"></span><span class="cr-s bl"></span><span class="cr-s br"></span>
    <div class="scr">
      <div class="meta">CAM_01 · 480i</div>
      <div class="boot">&gt; SIGNAL LOCK <span style="color:#4ade80">[ OK ]</span></div>
      <span class="cr-c tl"></span><span class="cr-c tr"></span><span class="cr-c bl"></span><span class="cr-c br"></span>
      <div class="sil"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMax meet">
        <defs><radialGradient id="s" cx="50%" cy="40%" r="55%"><stop offset="0%" stop-color="#f59e0b" stop-opacity=".75"/><stop offset="60%" stop-color="#d97706" stop-opacity=".45"/><stop offset="100%" stop-color="#92400e" stop-opacity=".15"/></radialGradient></defs>
        <circle cx="50" cy="34" r="17" fill="url(#s)"/>
        <path d="M 18 100 Q 18 62 50 62 Q 82 62 82 100 Z" fill="url(#s)"/>
      </svg></div>
      <div class="noise"></div>
      <div class="sweep"></div>
      <div class="meta2"><span class="sd"></span>REC · 00:42:18</div>
    </div>
  </div>
</div></body></html>
